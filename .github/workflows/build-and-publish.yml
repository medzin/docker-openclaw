name: Build and Publish OpenClaw

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check release variant wiring
        run: |
          ./scripts/test-release-variants.sh

      - name: Check for new versions
        id: set-matrix
        run: |
          MATRIX_JSON=$(./scripts/determine-versions.sh)
          echo "Build matrix: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: check-versions
    if: ${{ needs.check-versions.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        version: ${{ fromJson(needs.check-versions.outputs.matrix) }}
        variant: [minimal, extras]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set local image tag
        id: local_image
        run: |
          if [ "${{ matrix.variant }}" = "extras" ]; then
            echo "tag=medzin/openclaw:${{ matrix.version }}-extras" >> "$GITHUB_OUTPUT"
          else
            echo "tag=medzin/openclaw:${{ matrix.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          build-args: |
            OPENCLAW_VERSION=${{ matrix.version }}
            IMAGE_VARIANT=${{ matrix.variant }}
          tags: ${{ steps.local_image.outputs.tag }}
          cache-from: type=gha,scope=openclaw-${{ matrix.version }}
          cache-to: type=gha,scope=openclaw-${{ matrix.version }},mode=max

      - name: Run permission tests
        run: |
          ./scripts/test-permissions.sh ${{ steps.local_image.outputs.tag }} skip-build

      - name: Check if this version is the latest stable
        id: check_latest
        run: |
          if [ "${{ matrix.version }}" = "latest" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_TAG=$(./scripts/determine-versions.sh --latest-upstream)

          if [ "${{ matrix.version }}" = "$LATEST_TAG" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Docker tags
        id: docker_tags
        run: |
          {
            echo "tags<<EOF"
            if [ "${{ matrix.variant }}" = "extras" ]; then
              echo "medzin/openclaw:${{ matrix.version }}-extras"
              if [ "${{ steps.check_latest.outputs.is_latest }}" = "true" ]; then
                echo "medzin/openclaw:extras"
              fi
            else
              echo "medzin/openclaw:${{ matrix.version }}"
              if [ "${{ steps.check_latest.outputs.is_latest }}" = "true" ]; then
                echo "medzin/openclaw:latest"
              fi
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            OPENCLAW_VERSION=${{ matrix.version }}
            IMAGE_VARIANT=${{ matrix.variant }}
          tags: ${{ steps.docker_tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=openclaw-${{ matrix.version }}
          cache-to: type=gha,scope=openclaw-${{ matrix.version }},mode=max
